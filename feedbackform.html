<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        body{
            background: linear-gradient(to left , rgb(173, 42, 138) ,rgb(176, 95, 179), lightblue);
            background-image: url("R.jpeg");
            background-repeat: no-repeat;
            background-size: 2000px;
            padding: 20px;
            margin: auto;
            display: flex;
            background-color: skyblue;
            justify-content: center;
            font-size: 24px;
            margin-top: 20px;
        }
        .card {
            width: 1000px;
            height: 960px;
            background-color: white;
            color: #000000;
            border-radius: 35px;
            padding: 20px;
            box-shadow: rgba(155, 91, 238, 0.2) 0 15px 30px -5px;
            margin: auto;
        }
        .card__content {
            width: 96%;
            height: 96%;
            background: rgb(255, 255, 255);
            border-radius: 35px;
            padding: 20px;
            margin:auto;
          
        }

        div{
            margin-top: 25px;
            padding: auto;
        }
        label{
            margin-top: 20px;

        }
        h1{
            font-size: 40px;
            text-align: center;
        }
        textarea{
            width: 500px;
            height: 150px;
            font-size: 20px;
        }
        input{
            font-size: 20px;
        }
        fieldset{
            width: 1000px;
            height: 1000px;
            background-color: lightgray;
            color: #000000;
            border-radius: 35px;
            padding: 20px;
            box-shadow: rgba(66, 65, 68, 0.2) 0 15px 30px -5px;
            margin: auto;
        }
    </style>
</head>
<body>
     <form name="myForm" action="/action_page.php" onsubmit="return validateForm()" method="post"> 
        <fieldset>
            <div class="card">
            <h1>
               <center>Feedback Form </center>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
               &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
               <button type="button" onclick="location.href='mailto:np03022005@gmail.com';" style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Contact Us</button>      
                
            </h1>
            
            <div >
                <label for="name" >Name:</label>
                <input type="text" id="name" name="Name" placeholder="Your Name">
            </div>
            <br>
            <div>
                <label for="gender">Gender:</label>
                <input type="radio" id="Male" name="Gender" value="Male"> 
                <label for="mail">Male</label><br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="radio" id="Female" name="Gender" value="Female">
                <label for="Female">Female</label><br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="radio" id="" name="Gender" value="Male">
                <label for="Others">Others</label>
            </div>
            <br>
            <div>
                <label for="Mobile no">Mobile No:</label>
                <input type="number" id="Mobile no" name="number" placeholder="Your Mobile Number">
            </div>
            <br>
            <div>
                <label for="Emali">Email:</label>
                <input type="email" id="Email" name="email" placeholder="Your Email">
            </div>
            <br>
            <div>
                <label for="Feedback:">Feedback:</label>
                <textarea id="Text" id="Feedback" name="Feedback" placeholder="Your Feedback Goes Here" style="height:100px" ></textarea>
            </div>
           
            <br>
            <div>
                <label for="Is This Is Your First visit To Website ?">Is This Is Your First visit To Website </label>
                <br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="radio" id="Yes" name="Yes" value="YES">
                <label for="YES"> YES</label>
                <br>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="radio" id="No" name="Yes" value="NO">
                <label for="NO">NO</label>
            </div>
            <br>
            <div>
                <input type="submit" id="Submit" name="Submit">
                <input type="reset" id="reset" name="reset">
            </div>
        </div>
        </fieldset>
    </form>
</body>
<script>
    function validateForm() {
  let x = document.forms["myForm"]["name"].value;
  if (x == "") {
    alert("Name must be filled out");
    return false;
  }
  let y = document.forms["myForm"]["Mobile no"].value;
  if(isNaN(y)||y>9999999999 || y<1000000000){
    alert("Check Your Number");
    return false;
  }
  let z = document.forms["myForm"]["Feedback"].value;
  if (z == "") {
    alert("Feedback must be filled out");
    return false;
  }
} 
</script>
</html>
